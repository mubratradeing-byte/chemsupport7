<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry AI Support - Sri Lanka</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #e5ddd5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 450px; height: 90vh; background: white; border-radius: 10px; display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .header { background: #075e54; color: white; padding: 15px; text-align: center; border-radius: 10px 10px 0 0; font-size: 1.2em; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 85%; word-wrap: break-word; font-size: 0.95em; }
        .user { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: white; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #eee; }
        .input-area { padding: 15px; background: #f0f0f0; display: flex; border-radius: 0 0 10px 10px; }
        input { flex: 1; padding: 12px; border: none; border-radius: 25px; outline: none; }
        button { background: #075e54; color: white; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">Chemistry AI Support 🧪</div>
    <div id="chat-box">
        <div class="msg bot">ආයුබෝවන්! මම Chemistry AI සහායකයා. ඔබට ඇති රසායන විද්‍යා ගැටලු සිංහලෙන් අසන්න.</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="ප්‍රශ්නය මෙතැන ටයිප් කරන්න..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()" id="send-btn">යවන්න</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyD-LCJ28g3NXW4eVmjdAt_sRd4nhKI8VoU"; // ඔබේ Key එක මෙහි ඇතුළත් කර ඇත
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const sendBtn = document.getElementById("send-btn");
        const text = inputField.value.trim();

        if (!text) return;

        // User Message
        appendMessage(text, 'user');
        inputField.value = "";
        sendBtn.disabled = true;

        // Loading message
        const loadingDiv = appendMessage("සිතමින් පවතී...", 'bot');

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: "You are a helpful Chemistry teacher for Sri Lankan A/L and O/L students. Always explain clearly in Sinhala. Question: " + text }] }]
                })
            });

            const data = await response.json();
            loadingDiv.remove(); // Remove loading text

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                appendMessage(data.candidates[0].content.parts[0].text, 'bot');
            } else {
                throw new Error();
            }
        } catch (error) {
            loadingDiv.innerText = "කණගාටුයි, දෝෂයක් සිදු විය. කරුණාකර නැවත උත්සාහ කරන්න.";
        } finally {
            sendBtn.disabled = false;
        }
    }

    function appendMessage(text, type) {
        const chatBox = document.getElementById("chat-box");
        const div = document.createElement("div");
        div.className = `msg ${type}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
    }

    function handleKey(e) {
        if (e.key === 'Enter') sendMessage();
    }
</script>

</body>
</html>
